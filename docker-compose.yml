services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    # --reload watches for file changes so you don't need to rebuild on every edit
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      # Keeps the container's node_modules intact when the host directory is mounted
      - /app/node_modules
    environment:
      - API_TARGET=http://backend:8000
    depends_on:
      - backend
